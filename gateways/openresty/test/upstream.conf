worker_processes 1;
error_log /dev/stderr warn;
pid /tmp/stackverse-test-upstream.pid;

events {
  worker_connections 64;
}

http {
  access_log off;
  lua_package_path "/usr/local/openresty/site/lualib/?.lua;/usr/local/openresty/lualib/?.lua;;";

  server {
    listen 18081;

    location / {
      content_by_lua_block {
        local cjson = require("cjson.safe")
        ngx.req.read_body()
        local headers = ngx.req.get_headers(0)
        ngx.header["Content-Type"] = "application/json"
        ngx.header["ETag"] = '"native-proxy"'
        ngx.header["Content-Language"] = "en"
        ngx.print(cjson.encode({
          authorization = headers.authorization,
          body = ngx.req.get_body_data() or "",
          connection = headers.connection,
          cookie = headers.cookie,
          method = ngx.req.get_method(),
          path = ngx.var.request_uri,
          traceparent = headers.traceparent,
          upgrade = headers.upgrade,
          xsrf = headers["x-xsrf-token"],
        }))
      }
    }
  }
}
