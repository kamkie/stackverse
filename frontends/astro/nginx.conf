server {
    listen 8080;
    server_name _;

    root /dist;
    index index.html;

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location ~* \.(?:css|js|mjs|map|json|ico|png|jpg|jpeg|gif|svg|webp|woff2?|ttf|eot)$ {
        try_files $uri =404;
    }

    location / {
        # Astro emits directory-style routes (feed/index.html). Resolve their
        # document directly so canonical route URLs do not gain a trailing slash.
        try_files $uri $uri/index.html $uri/ /index.html;
    }
}
