<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- Required for deep links: without it, asset URLs and router-generated
         hrefs resolve relative to the current path (/admin/users/main.js). -->
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Placeholder only: the runtime bundle replaces the title once loaded. -->
    <title>Stackverse</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <script>
      // Apply the persisted theme before first paint (see spec/design/tokens.css).
      (function () {
        try {
          var theme = localStorage.getItem('stackverse.theme');
          if (theme === 'light' || theme === 'dark') {
            document.documentElement.setAttribute('data-theme', theme);
          }
        } catch (e) {
          /* storage unavailable — stay on auto */
        }
      })();
    </script>
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
