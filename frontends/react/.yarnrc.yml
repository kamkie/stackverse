# Yarn Berry with Plug'n'Play: no node_modules — dependency resolution goes
# through .pnp.cjs, package archives live in the global cache (globalFolder,
# machine-level setting). msw's postinstall is disabled via dependenciesMeta
# in package.json (public/mockServiceWorker.js is committed).
nodeLinker: pnp

# openapi-typescript 7.x declares peer typescript ^5; the project is on TS 6.
packageExtensions:
  "openapi-typescript@*":
    peerDependencies:
      typescript: "^5 || ^6"
