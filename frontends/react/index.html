<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Placeholder only: the runtime bundle replaces the title once loaded. -->
    <title>Stackverse</title>
    <script>
      // Apply the persisted theme before first paint (see spec/design/tokens.css).
      (function () {
        try {
          var theme = localStorage.getItem("stackverse.theme");
          if (theme === "light" || theme === "dark") {
            document.documentElement.setAttribute("data-theme", theme);
          }
        } catch (e) {
          /* storage unavailable — stay on auto */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
