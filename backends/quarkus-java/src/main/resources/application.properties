quarkus.application.name=stackverse-backend-quarkus-java
quarkus.http.port=${PORT:8080}

quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:stackverse}
quarkus.datasource.username=${DB_USER:stackverse}
quarkus.datasource.password=${DB_PASSWORD:stackverse}
quarkus.datasource.jdbc.max-size=10

quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=db/migration

mp.jwt.verify.issuer=${OIDC_ISSUER_URI:http://localhost:8180/realms/stackverse}
mp.jwt.verify.publickey.location=${OIDC_JWKS_URI:http://localhost:8180/realms/stackverse/protocol/openid-connect/certs}
mp.jwt.verify.audiences=stackverse-api
smallrye.jwt.path.groups=realm_access/roles
quarkus.http.auth.proactive=false

stackverse.seed.messages-dir=${SEED_MESSAGES_DIR:../../spec/messages}

quarkus.jackson.write-dates-as-timestamps=false
quarkus.log.level=${LOG_LEVEL:INFO}
quarkus.log.console.json.enabled=true
quarkus.log.console.json.mdc.flat-fields=true
quarkus.log.console.json.exception-output-type=detailed

quarkus.otel.logs.enabled=true
quarkus.otel.metrics.enabled=true
