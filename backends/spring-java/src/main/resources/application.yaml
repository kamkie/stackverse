server:
  port: ${PORT:8080}

logging:
  level:
    # docs/LOGGING.md §8 - relaxed binding accepts the contract's lowercase values
    root: ${LOG_LEVEL:info}

spring:
  application:
    name: stackverse-backend-spring-java
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:stackverse}
    username: ${DB_USER:stackverse}
    password: ${DB_PASSWORD:stackverse}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
stackverse:
  oidc:
    issuer-uri: ${OIDC_ISSUER_URI:http://localhost:8180/realms/stackverse}
    # inside compose the issuer host (localhost:8180) is not dialable from a
    # container; keys are then fetched here while the issuer claim stays as-is
    jwks-uri: ${OIDC_JWKS_URI:}
    audience: stackverse-api

  seed:
    # language = filename; the directory lives at the repo root (spec/messages)
    # and is copied into the container image by the Dockerfile
    messages-dir: ${SEED_MESSAGES_DIR:../../spec/messages}
