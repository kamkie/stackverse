grails:
  profile: rest-api
  codegen:
    defaultPackage: dev.stackverse.backend
  mime:
    disable:
      accept:
        header:
          userAgents:
            - Gecko
            - WebKit
            - Presto
            - Trident
    types:
      json:
        - application/json
        - text/json
      problem:
        - application/problem+json

server:
  port: ${PORT:8080}

dataSource:
  pooled: true
  jmxExport: true
  type: com.zaxxer.hikari.HikariDataSource
  driverClassName: org.postgresql.Driver
  dialect: org.hibernate.dialect.PostgreSQLDialect
  dbCreate: none
  url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:stackverse}
  username: ${DB_USER:stackverse}
  password: ${DB_PASSWORD:stackverse}
  properties:
    maximumPoolSize: 10

spring:
  main:
    banner-mode: "off"
  flyway:
    locations: classpath:db/migration
  jackson:
    default-property-inclusion: non_null

stackverse:
  oidc:
    issuer-uri: ${OIDC_ISSUER_URI:http://localhost:8180/realms/stackverse}
    jwks-uri: ${OIDC_JWKS_URI:}
    audience: ${OIDC_AUDIENCE:stackverse-api}
  seed:
    messages-dir: ${SEED_MESSAGES_DIR:../../spec/messages}
