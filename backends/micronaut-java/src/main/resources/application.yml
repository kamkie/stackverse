micronaut:
  application:
    name: stackverse-backend-micronaut-java
  server:
    port: ${PORT:8080}
  router:
    static-resources:
      enabled: false

datasources:
  default:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:stackverse}
    username: ${DB_USER:stackverse}
    password: ${DB_PASSWORD:stackverse}
    driver-class-name: org.postgresql.Driver

flyway:
  datasources:
    default:
      enabled: true

jackson:
  deserialization:
    fail-on-unknown-properties: false
  serialization:
    write-dates-as-timestamps: false
  serialization-inclusion: NON_NULL

stackverse:
  oidc:
    issuer-uri: ${OIDC_ISSUER_URI:http://localhost:8180/realms/stackverse}
    jwks-uri: ${OIDC_JWKS_URI:}
    audience: ${OIDC_AUDIENCE:stackverse-api}
  seed:
    messages-dir: ${SEED_MESSAGES_DIR:../../spec/messages}
