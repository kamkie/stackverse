# Infrastructure runs with plain `docker compose up -d`.
# App components (backend/gateway/frontend) are behind the `app` profile and pluggable:
#
#   BACKEND_IMAGE=stackverse/backend-spring-kotlin:local \
#   GATEWAY_IMAGE=stackverse/gateway-yarp:local \
#   FRONTEND_IMAGE=stackverse/frontend-react:local \
#   docker compose --profile app up
#
# Observability (Grafana + OTLP collector, see docs/RUNNING.md) is a separate
# profile; enable telemetry export with OTEL_SDK_DISABLED=false:
#
#   OTEL_SDK_DISABLED=false docker compose --profile app --profile observability up

name: stackverse

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: stackverse
      POSTGRES_USER: stackverse
      POSTGRES_PASSWORD: stackverse
    ports:
      - "5432:5432"
    volumes:
      # postgres 18+ images keep PGDATA in a versioned subdirectory and refuse
      # a mount at the old /var/lib/postgresql/data — mount the parent instead
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stackverse -d stackverse"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.6
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      # issuer must look the same from the host and from inside the compose network
      KC_HOSTNAME: http://localhost:8180
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      # the healthcheck below probes /health/ready on the management port (9000)
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8180:8080"
    volumes:
      - ./infra/keycloak:/opt/keycloak/data/import:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/9000 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && grep -q '200 OK' <&3"]
      interval: 10s
      timeout: 5s
      retries: 20

  backend:
    profiles: [app]
    # default is a non-existent placeholder — set BACKEND_IMAGE (or .env) to a real image
    image: ${BACKEND_IMAGE:-stackverse/backend:unset}
    environment:
      PORT: "8080"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: stackverse
      DB_USER: stackverse
      DB_PASSWORD: stackverse
      OIDC_ISSUER_URI: http://localhost:8180/realms/stackverse
      # the issuer host above is not dialable from inside the network, so keys
      # are fetched from the keycloak service directly; iss validation is unchanged
      OIDC_JWKS_URI: http://keycloak:8080/realms/stackverse/protocol/openid-connect/certs
      OTEL_SERVICE_NAME: stackverse-backend
      OTEL_EXPORTER_OTLP_ENDPOINT: http://lgtm:4317
      OTEL_SDK_DISABLED: ${OTEL_SDK_DISABLED:-true}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-json}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  # One-shot: the image's default command publishes its static build (/dist)
  # into the shared volume and exits; the gateway serves it via SPA_ROOT.
  frontend:
    profiles: [app]
    # default is a non-existent placeholder — set FRONTEND_IMAGE (or .env) to a real image
    image: ${FRONTEND_IMAGE:-stackverse/frontend:unset}
    volumes:
      - spa-dist:/spa

  gateway:
    profiles: [app]
    # default is a non-existent placeholder — set GATEWAY_IMAGE (or .env) to a real image
    image: ${GATEWAY_IMAGE:-stackverse/gateway:unset}
    environment:
      PORT: "8000"
      BACKEND_URL: http://backend:8080
      REDIS_URL: redis://redis:6379
      OIDC_ISSUER_URI: http://localhost:8180/realms/stackverse
      OIDC_CLIENT_ID: stackverse-gateway
      OIDC_CLIENT_SECRET: stackverse-secret
      PUBLIC_URL: http://localhost:8000
      SPA_ROOT: /spa
      OTEL_SERVICE_NAME: stackverse-gateway
      OTEL_EXPORTER_OTLP_ENDPOINT: http://lgtm:4317
      OTEL_SDK_DISABLED: ${OTEL_SDK_DISABLED:-true}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-json}
    ports:
      - "8000:8000"
    volumes:
      - spa-dist:/spa:ro
    extra_hosts:
      - "localhost:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      backend:
        condition: service_started
      frontend:
        condition: service_completed_successfully

  # All-in-one observability: OTLP collector + Prometheus + Tempo + Loki +
  # Grafana. Dev-grade by design — one container, no persistence.
  lgtm:
    profiles: [observability]
    image: grafana/otel-lgtm:0.28.0
    ports:
      - "3000:3000" # Grafana UI (admin / admin)
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP

volumes:
  postgres-data:
  # the frontend's static build, published by the frontend one-shot and served
  # read-only by the gateway (SPA_ROOT)
  spa-dist:
