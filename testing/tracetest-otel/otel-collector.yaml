receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  transform/service_identity:
    error_mode: ignore
    trace_statements:
      - context: span
        statements:
          - set(attributes["service.name"], resource.attributes["service.name"])
  batch:
    timeout: 100ms

exporters:
  otlp/lgtm:
    endpoint: lgtm:4317
    tls:
      insecure: true
  otlp/tracetest:
    endpoint: tracetest:4317
    tls:
      insecure: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [transform/service_identity, batch]
      exporters: [otlp/lgtm, otlp/tracetest]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/lgtm]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/lgtm]
