info:
  name: Healthz
  type: http
  seq: 1
  tags:
    - smoke
    - public

http:
  method: GET
  url: "{{BACKEND_URL}}/healthz"
  auth: inherit

runtime:
  scripts:
    - type: before-request
      code: |-
        if (!bru.getVar("runId")) {
          bru.setVar("runId", "bruno-" + Date.now().toString(36));
        }
    - type: tests
      code: |-
        test("backend liveness is available", function() {
          expect(res.status).to.equal(200);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
