# Stackverse ZAP baseline smoke configuration.
# Format: <rule-id> <WARN|INFO|IGNORE|FAIL> <note>
#
# Keep local-dev expectations visible as WARN instead of suppressing them.
# scripts/zap-security.* pass -I by default, so WARN findings are reported but
# do not fail the smoke scan. Set ZAP_FAIL_ON_WARNINGS=true to restore ZAP's
# exit code 2 for WARN-only scans.
10010	WARN	(Cookie No HttpOnly Flag) XSRF-TOKEN is intentionally readable for the gateway double-submit CSRF check; review if an authenticated scan reports this for stackverse_session.
10011	WARN	(Cookie Without Secure Flag) Local http://localhost development cookies are not Secure; the gateway uses Secure outside local HTTP development.
10035	WARN	(Strict-Transport-Security Header Not Set) HSTS is emitted only when PUBLIC_URL is https, so localhost HTTP smoke scans may report this.
10202	WARN	(Absence of Anti-CSRF Tokens) The anonymous baseline may see IdP/login forms; Stackverse state-changing API calls are protected at the gateway.
