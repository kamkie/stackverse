# One update config per ecosystem per implementation directory — implementations
# are siblings with independent toolchains, so their updates stay independent too.
# Minor + patch bumps are grouped into a single PR per ecosystem; majors stay
# separate so a breaking upgrade is reviewed on its own.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions-minor:
        update-types: [minor, patch]

  - package-ecosystem: gradle
    directory: /backends/spring-kotlin
    schedule:
      interval: weekly
    groups:
      gradle-minor:
        update-types: [minor, patch]
    ignore:
      # CodeQL's Kotlin extractor rejects 2.4+ (github/codeql#21938) — drop
      # this once a CodeQL release supports it, then bump build.gradle.kts.
      # Dependabot names plugins from the plugins-DSL shorthand, so the
      # kotlin("jvm") family shows up as bare "jvm"/"plugin.*", not
      # "org.jetbrains.kotlin.*" — both spellings stay ignored.
      - dependency-name: "org.jetbrains.kotlin*"
        versions: ["[2.4,)"]
      - dependency-name: "jvm"
        versions: ["[2.4,)"]
      - dependency-name: "plugin.spring"
        versions: ["[2.4,)"]
      - dependency-name: "plugin.jpa"
        versions: ["[2.4,)"]

  - package-ecosystem: nuget
    directories:
      - /backends/dotnet
      - /gateways/yarp
    schedule:
      interval: weekly
    groups:
      nuget-minor:
        update-types: [minor, patch]

  - package-ecosystem: npm
    directories:
      - /frontends/react
      - /conformance
      - /e2e
    schedule:
      interval: weekly
    groups:
      npm-minor:
        update-types: [minor, patch]

  # Dockerfile base images
  - package-ecosystem: docker
    directories:
      - /backends/dotnet
      - /backends/spring-kotlin
      - /gateways/yarp
      - /frontends/react
    schedule:
      interval: weekly

  # infra images in compose.yaml (postgres, redis, keycloak, otel-lgtm)
  - package-ecosystem: docker-compose
    directory: /
    schedule:
      interval: weekly
