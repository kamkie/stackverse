# One update config per ecosystem per implementation directory — implementations
# are siblings with independent toolchains, so their updates stay independent too.
# Minor + patch bumps are grouped into a single PR per ecosystem; majors stay
# separate so a breaking upgrade is reviewed on its own.
#
# Planned-but-unstarted variants are pre-seeded as commented entries (Dependabot
# errors on directories that do not exist yet): a variant PR uncomments its line
# instead of inventing a new hunk, so parallel variant PRs stay conflict-free.
# Directory lists stay alphabetized.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions-minor:
        update-types: [minor, patch]

  - package-ecosystem: cargo
    directories:
      - /backends/rust-axum
      - /gateways/rust
    schedule:
      interval: weekly
    groups:
      cargo-minor:
        update-types: [minor, patch]

  - package-ecosystem: bundler
    directory: /backends/ruby-rails
    schedule:
      interval: weekly
    groups:
      bundler-minor:
        update-types: [minor, patch]

  - package-ecosystem: composer
    directories:
      - /backends/php-laravel
    schedule:
      interval: weekly
    groups:
      composer-minor:
        update-types: [minor, patch]

  - package-ecosystem: gomod
    directories:
      - /backends/go
      - /backends/go-echo
      - /gateways/go
    schedule:
      interval: weekly
    groups:
      gomod-minor:
        update-types: [minor, patch]

  - package-ecosystem: gradle
    directories:
      - /backends/grails
      - /backends/ktor-kotlin
      - /backends/micronaut-java
      - /backends/spring-java
      - /backends/spring-kotlin
      - /gateways/spring-cloud-gateway
    schedule:
      interval: weekly
    groups:
      gradle-minor:
        update-types: [minor, patch]

  - package-ecosystem: maven
    directories:
      - /backends/open-liberty-java
      - /backends/quarkus-java
    schedule:
      interval: weekly
    groups:
      maven-minor:
        update-types: [minor, patch]
    ignore:
      # Open Liberty currently exposes mpJwt-2.1; keep the API aligned until
      # the runtime publishes support for MicroProfile JWT 2.2.
      - dependency-name: org.eclipse.microprofile.jwt:microprofile-jwt-auth-api
        versions: ["2.2"]

  - package-ecosystem: mix
    directory: /backends/elixir-phoenix
    schedule:
      interval: weekly
    groups:
      mix-minor:
        update-types: [minor, patch]

  - package-ecosystem: npm
    directories:
      - /backends/node-nestjs
      - /backends/node-ts
      - /conformance
      - /e2e
      - /frontends/angular
      - /frontends/lit
      - /frontends/qwik
      - /frontends/react
      - /frontends/solid
      - /frontends/svelte
      - /frontends/vanilla-ts
      - /frontends/vue
      - /gateways/node-fastify
      - /testing/axe-a11y
      - /testing/bruno-api
      - /testing/cypress-e2e
      - /testing/postman-api
      - /testing/selenium-e2e
    schedule:
      interval: weekly
    groups:
      npm-minor:
        update-types: [minor, patch]
  - package-ecosystem: nuget
    directories:
      - /backends/dotnet
      - /gateways/yarp
    schedule:
      interval: weekly
    groups:
      nuget-minor:
        update-types: [minor, patch]

  - package-ecosystem: sbt
    directories:
      - /backends/play-scala
      - /backends/scala-http4s
    schedule:
      interval: weekly
    groups:
      sbt-minor:
        update-types: [minor, patch]

  - package-ecosystem: pip
    directories:
      - /backends/python-django
      - /backends/python-fastapi
      - /gateways/python
      - /testing/robot-acceptance
      - /testing/schemathesis-api
    schedule:
      interval: weekly
    groups:
      pip-minor:
        update-types: [minor, patch]

  # Dockerfile base images
  - package-ecosystem: docker
    directories:
      - /backends/dotnet
      - /backends/elixir-phoenix
      - /backends/go
      - /backends/go-echo
      - /backends/grails
      - /backends/ktor-kotlin
      - /backends/micronaut-java
      - /backends/node-nestjs
      - /backends/node-ts
      - /backends/open-liberty-java
      - /backends/php-laravel
      - /backends/play-scala
      - /backends/python-django
      - /backends/python-fastapi
      - /backends/quarkus-java
      - /backends/ruby-rails
      - /backends/rust-axum
      - /backends/scala-http4s
      - /backends/spring-java
      - /backends/spring-kotlin
      - /frontends/angular
      - /frontends/lit
      - /frontends/qwik
      - /frontends/react
      - /frontends/solid
      - /frontends/svelte
      - /frontends/vanilla-ts
      - /frontends/vue
      - /gateways/apisix
      - /gateways/go
      - /gateways/node-fastify
      - /gateways/openresty
      - /gateways/python
      - /gateways/rust
      - /gateways/spring-cloud-gateway
      - /gateways/yarp
    schedule:
      interval: weekly

  # infra images in compose.yaml (postgres, redis, keycloak, otel-lgtm)
  - package-ecosystem: docker-compose
    directories:
      - /
      - /testing/tracetest-otel
    schedule:
      interval: weekly
