# One update config per ecosystem per implementation directory — implementations
# are siblings with independent toolchains, so their updates stay independent too.
# Minor + patch bumps are grouped into a single PR per ecosystem; majors stay
# separate so a breaking upgrade is reviewed on its own.
#
# Planned-but-unstarted variants are pre-seeded as commented entries (Dependabot
# errors on directories that do not exist yet): a variant PR uncomments its line
# instead of inventing a new hunk, so parallel variant PRs stay conflict-free.
# Directory lists stay alphabetized.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions-minor:
        update-types: [minor, patch]

  - package-ecosystem: gomod
    directories:
      - /backends/go
      - /gateways/go
    schedule:
      interval: weekly
    groups:
      gomod-minor:
        update-types: [minor, patch]

  - package-ecosystem: gradle
    directories:
      - /backends/spring-kotlin
      - /gateways/spring-cloud-gateway
    schedule:
      interval: weekly
    groups:
      gradle-minor:
        update-types: [minor, patch]
    ignore:
      # CodeQL's Kotlin extractor rejects 2.4+ (github/codeql#21938) — drop
      # this once a CodeQL release supports it, then bump build.gradle.kts.
      # Dependabot names plugins from the plugins-DSL shorthand, so the
      # kotlin("jvm") family shows up as bare "jvm"/"plugin.*", not
      # "org.jetbrains.kotlin.*" — both spellings stay ignored.
      - dependency-name: "org.jetbrains.kotlin*"
        versions: ["[2.4,)"]
      - dependency-name: "jvm"
        versions: ["[2.4,)"]
      - dependency-name: "plugin.spring"
        versions: ["[2.4,)"]
      - dependency-name: "plugin.jpa"
        versions: ["[2.4,)"]

  - package-ecosystem: npm
    directories:
      - /backends/node-nestjs
      - /backends/node-ts
      - /conformance
      - /e2e
      - /frontends/angular
      - /frontends/react
      - /frontends/svelte
      - /frontends/vue
      - /gateways/node-fastify
      - /testing/axe-a11y
      - /testing/cypress-e2e
    schedule:
      interval: weekly
    groups:
      npm-minor:
        update-types: [minor, patch]

  - package-ecosystem: nuget
    directories:
      - /backends/dotnet
      - /gateways/yarp
    schedule:
      interval: weekly
    groups:
      nuget-minor:
        update-types: [minor, patch]

  - package-ecosystem: pip
    directory: /testing/schemathesis-api
    schedule:
      interval: weekly
    groups:
      pip-minor:
        update-types: [minor, patch]

  # Dockerfile base images
  - package-ecosystem: docker
    directories:
      - /backends/dotnet
      - /backends/go
      - /backends/node-nestjs
      - /backends/node-ts
      - /backends/spring-kotlin
      - /frontends/angular
      - /frontends/react
      - /frontends/svelte
      - /frontends/vue
      - /gateways/go
      - /gateways/node-fastify
      - /gateways/openresty
      - /gateways/spring-cloud-gateway
      - /gateways/yarp
    schedule:
      interval: weekly

  # infra images in compose.yaml (postgres, redis, keycloak, otel-lgtm)
  - package-ecosystem: docker-compose
    directory: /
    schedule:
      interval: weekly
