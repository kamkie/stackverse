# Build and smoke tests for one implementation. Each implementation has its own
# build workflow file so parallel variant PRs never edit a shared workflow —
# adding a variant means adding a sibling file, nothing else.
name: build-gateway-openresty

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - '.github/workflows/build-gateway-openresty.yml'
      - 'gateways/openresty/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gateway-openresty:
    name: Gateway · OpenResty
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: gateways/openresty
    steps:
      - uses: actions/checkout@v7
      - name: Build image
        run: docker build -t stackverse/gateway-openresty:local .
      - name: Validate OpenResty config
        run: docker run --rm stackverse/gateway-openresty:local openresty -t -c /usr/local/openresty/nginx/conf/nginx.conf
      - name: Run Lua smoke tests with coverage
        run: |
          mkdir -p coverage
          docker run --rm \
            -v "${{ github.workspace }}/gateways/openresty/coverage:/coverage" \
            stackverse/gateway-openresty:local \
            resty -I /opt/stackverse/lua /opt/stackverse/test/coverage.lua /opt/stackverse/test/smoke.lua /coverage/lcov.info
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        continue-on-error: true
        with:
          files: gateways/openresty/coverage/lcov.info
          flags: gateway-openresty
          token: ${{ secrets.CODECOV_TOKEN }}
