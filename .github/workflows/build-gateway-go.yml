# Build and unit/integration tests for one implementation. Each implementation
# has its own build workflow file so parallel variant PRs never edit a shared
# workflow — adding a variant means adding a sibling file, nothing else.
name: build-gateway-go

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - '.github/workflows/build-gateway-go.yml'
      - 'gateways/go/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gateway-go:
    name: Gateway · Go (stdlib + chi)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: gateways/go
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: gateways/go/go.mod
          cache-dependency-path: gateways/go/go.sum
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Test
        run: |
          mkdir -p TestResults
          go run gotest.tools/gotestsum@v1.13.0 --junitfile TestResults/junit.xml \
            -- -coverprofile coverage.out -covermode=atomic ./...
      - name: Normalize coverage paths
        run: node ../../tools/normalize-coverage-paths.mjs coverage.out gateways/go/
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: gateways/go/coverage.out
          flags: gateway-go
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v7
        with:
          report_type: test_results
          files: gateways/go/TestResults/junit.xml
          flags: gateway-go
          token: ${{ secrets.CODECOV_TOKEN }}

  # The dependency submission API requires contents: write. Keep PR builds
  # read-only and submit resolved Go module snapshots only from trusted main pushes.
  gateway-go-dependency-submission:
    name: Gateway · Go dependency submission
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: gateways/go/go.mod
          cache-dependency-path: gateways/go/go.sum
      - name: Submit Go dependency graph
        uses: actions/go-dependency-submission@v2
        with:
          go-mod-path: gateways/go/go.mod
