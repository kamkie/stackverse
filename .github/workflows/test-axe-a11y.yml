name: Axe A11y Showcase

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  axe-a11y:
    name: axe-core a11y - spring-kotlin + yarp + react
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      BACKEND_IMAGE: stackverse/backend-spring-kotlin:local
      GATEWAY_IMAGE: stackverse/gateway-yarp:local
      FRONTEND_IMAGE: stackverse/frontend-react:local
      STACKVERSE_URL: http://localhost:8000
      CI: "true"
    steps:
      - uses: actions/checkout@v7
      - name: Build images
        run: ./scripts/build-images.sh spring-kotlin yarp react
      - name: Start the full stack
        run: docker compose --profile app up -d
      - run: corepack enable
      - uses: actions/setup-node@v7
        with:
          node-version: 24
      - uses: actions/cache@v6
        with:
          path: ~/.yarn/berry/cache
          key: yarn-${{ runner.os }}-axe-a11y-${{ hashFiles('testing/axe-a11y/yarn.lock') }}
          restore-keys: yarn-${{ runner.os }}-axe-a11y-
      - name: Install dependencies
        working-directory: testing/axe-a11y
        run: yarn install --immutable
      - name: Install Playwright browser
        working-directory: testing/axe-a11y
        run: yarn playwright install --with-deps chromium
      - name: Typecheck suite
        working-directory: testing/axe-a11y
        run: yarn typecheck
      - name: Wait for the stack to be ready
        run: |
          for _ in $(seq 1 90); do
            if curl -fsS http://localhost:8080/readyz >/dev/null 2>&1 \
               && curl -fsS http://localhost:8000/ >/dev/null 2>&1; then exit 0; fi
            sleep 2
          done
          echo "stack never became ready" >&2
          exit 1
      - name: Run axe-core accessibility suite
        working-directory: testing/axe-a11y
        run: yarn test
      - name: Dump compose logs
        if: failure()
        run: docker compose logs
      - name: Upload axe accessibility artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: axe-a11y-artifacts
          path: |
            testing/axe-a11y/playwright-report/
            testing/axe-a11y/test-results/
          if-no-files-found: ignore
          retention-days: 7
