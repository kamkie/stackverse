# Build and unit/integration tests for one implementation. Each implementation
# has its own build workflow file so parallel variant PRs never edit a shared
# workflow — adding a variant means adding a sibling file, nothing else.
# The contract suites (conformance/e2e) and the ci-ok merge gate live in ci.yml.
name: build-gateway-yarp

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - '.github/workflows/build-gateway-yarp.yml'
      - 'gateways/yarp/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gateway-yarp:
    name: Gateway · YARP (ASP.NET Core)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: gateways/yarp
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.301
      # integration tests bring up Keycloak and Redis via Testcontainers
      - name: Build and test
        run: dotnet test --collect:"XPlat Code Coverage" --logger junit --results-directory TestResults
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        continue-on-error: true
        with:
          directory: gateways/yarp/TestResults
          flags: gateway-yarp
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v7
        continue-on-error: true
        with:
          report_type: test_results
          files: gateways/yarp/TestResults/TestResults.xml
          flags: gateway-yarp
          token: ${{ secrets.CODECOV_TOKEN }}

  # The dependency submission API requires contents: write. Keep PR builds
  # read-only and submit resolved NuGet snapshots only from trusted main pushes.
  gateway-yarp-dependency-submission:
    name: Gateway · YARP dependency submission
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.301
      - name: Restore packages
        run: dotnet restore
        working-directory: gateways/yarp
      - name: Submit NuGet dependency graph
        uses: advanced-security/component-detection-dependency-submission-action@v0.1.4
        with:
          filePath: gateways/yarp
          detectorsCategories: NuGet
          correlator: gateway-yarp
