# Build and unit tests for one implementation. Each implementation has its own
# build workflow so parallel variant PRs never edit a shared workflow.
name: build-backend-rust-axum

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - '.github/workflows/build-backend-rust-axum.yml'
      - 'backends/rust-axum/**'
      - 'spec/openapi.yaml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend-rust-axum:
    name: Backend · Rust Axum
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backends/rust-axum
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backends/rust-axum/target
          key: cargo-${{ runner.os }}-backend-rust-axum-${{ hashFiles('backends/rust-axum/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-backend-rust-axum-
      - name: Format
        run: cargo fmt --check
      - name: Check
        run: cargo check --locked
      - name: Clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings
      - name: Test with coverage
        run: |
          mkdir -p coverage
          cargo llvm-cov --locked --lcov --output-path coverage/lcov.info
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        continue-on-error: true
        with:
          files: backends/rust-axum/coverage/lcov.info
          flags: backend-rust-axum
          token: ${{ secrets.CODECOV_TOKEN }}

  # The dependency submission API requires contents: write. Keep PR builds
  # read-only and submit resolved Cargo snapshots only from trusted main pushes.
  backend-rust-axum-dependency-submission:
    name: Backend · Rust Axum dependency submission
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - name: Submit Cargo dependency graph
        uses: advanced-security/component-detection-dependency-submission-action@v0.1.4
        with:
          filePath: backends/rust-axum
          detectorsCategories: Cargo
          correlator: backend-rust-axum
