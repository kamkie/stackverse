# Build and unit tests for one implementation. Each implementation has its own
# build workflow file so parallel variant PRs never edit a shared workflow —
# adding a variant means adding a sibling file, nothing else. The contract
# suites (conformance/e2e) and the ci-ok merge gate live in ci.yml.
name: build-backend-node-nestjs

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - '.github/workflows/build-backend-node-nestjs.yml'
      - 'backends/node-nestjs/**'
      - 'spec/openapi.yaml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend-node-nestjs:
    name: Backend · Node.js (NestJS)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backends/node-nestjs
    steps:
      - uses: actions/checkout@v7
      - run: corepack enable
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      # Yarn Berry PnP with a per-project cache (enableGlobalCache: false)
      - uses: actions/cache@v6
        with:
          path: backends/node-nestjs/.yarn/cache
          key: yarn-${{ runner.os }}-backend-node-nestjs-${{ hashFiles('backends/node-nestjs/yarn.lock') }}
          restore-keys: yarn-${{ runner.os }}-backend-node-nestjs-
      - name: Install dependencies
        run: yarn install --immutable
      - name: Typecheck and build
        run: yarn build
      - name: Test with coverage
        run: yarn test --coverage
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: backends/node-nestjs/coverage/lcov.info
          flags: backend-node-nestjs
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v7
        with:
          report_type: test_results
          files: backends/node-nestjs/test-results/junit.xml
          flags: backend-node-nestjs
          token: ${{ secrets.CODECOV_TOKEN }}
