# Optional Robot Framework showcase. This workflow is manual-only so it does
# not become part of the ci-ok merge gate while the suite remains non-canonical.
name: test-robot-acceptance

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  robot-acceptance:
    name: Robot Framework acceptance showcase
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      BACKEND_IMAGE: stackverse/backend-spring-kotlin:local
      GATEWAY_IMAGE: stackverse/gateway-yarp:local
      FRONTEND_IMAGE: stackverse/frontend-react:local
      STACKVERSE_URL: http://localhost:8000
      ROBOT_BROWSER: headlesschrome
    steps:
      - uses: actions/checkout@v7
      - uses: browser-actions/setup-chrome@v2
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: testing/robot-acceptance/requirements.txt
      - name: Install dependencies
        working-directory: testing/robot-acceptance
        run: python -m pip install --disable-pip-version-check -r requirements.txt
      - name: Build reference images
        run: ./scripts/build-images.sh spring-kotlin yarp react
      - name: Start the full stack
        run: docker compose --profile app up -d
      - name: Wait for the stack to be ready
        run: |
          for _ in $(seq 1 90); do
            if curl -fsS http://localhost:8080/readyz >/dev/null 2>&1 \
               && curl -fsS http://localhost:8000/ >/dev/null 2>&1; then exit 0; fi
            sleep 2
          done
          echo "stack never became ready" >&2
          exit 1
      - name: Run Robot suite
        working-directory: testing/robot-acceptance
        run: python -m robot --outputdir results tests
      - name: Dump compose logs
        if: failure()
        run: docker compose logs
      - name: Upload Robot artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: robot-acceptance-results
          path: testing/robot-acceptance/results/
          if-no-files-found: ignore
          retention-days: 7
