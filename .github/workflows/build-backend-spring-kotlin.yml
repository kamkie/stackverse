# Build and unit/integration tests for one implementation. Each implementation
# has its own build workflow file so parallel variant PRs never edit a shared
# workflow — adding a variant means adding a sibling file, nothing else.
# The contract suites (conformance/e2e) and the ci-ok merge gate live in ci.yml.
name: build-backend-spring-kotlin

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - '.github/workflows/build-backend-spring-kotlin.yml'
      - 'backends/spring-kotlin/**'
      - 'spec/openapi.yaml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend-spring-kotlin:
    name: Backend · Spring Boot (Kotlin)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backends/spring-kotlin
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - uses: gradle/actions/setup-gradle@v6
      # integration tests bring up PostgreSQL via Testcontainers
      - name: Build and test
        run: ./gradlew build
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: backends/spring-kotlin/build/reports/jacoco/test/jacocoTestReport.xml
          flags: backend-spring-kotlin
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v7
        with:
          report_type: test_results
          directory: backends/spring-kotlin/build/test-results/test
          flags: backend-spring-kotlin
          token: ${{ secrets.CODECOV_TOKEN }}
