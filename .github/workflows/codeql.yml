# CodeQL static analysis over every language in the repo. Kotlin and Go both
# need a real compile — build-mode none analyzes Java but skips Kotlin sources,
# and Go has no buildless mode at all — so those matrix legs build manually;
# the rest scan buildless. Markdown/CODEOWNERS-only pull requests still produce
# the CodeQL result required by the main-branch ruleset, but run only the cheap
# Actions analysis instead of compiling every language.
name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 4 * * 1" # weekly, catches newly published queries

permissions:
  contents: read

jobs:
  select-matrix:
    name: Select CodeQL matrix
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      include: ${{ steps.matrix.outputs.include }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - id: matrix
        name: Use a lightweight matrix for documentation-only PRs
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -eu
          full='[{"language":"actions","sarif-language":"actions","build-mode":"none"},{"language":"csharp","sarif-language":"csharp","build-mode":"none"},{"language":"go","sarif-language":"go","build-mode":"manual"},{"language":"java-kotlin","sarif-language":"java","build-mode":"manual"},{"language":"javascript-typescript","sarif-language":"javascript","build-mode":"none"}]'
          lightweight='[{"language":"actions","sarif-language":"actions","build-mode":"none"}]'

          include="$full"
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            changed_files=$(mktemp)
            if ! git diff --name-only "$BASE_SHA...$HEAD_SHA" > "$changed_files"; then
              echo "::warning::could not classify changed files; running the full CodeQL matrix"
            elif ! grep -Evq '\.md$|^\.github/CODEOWNERS$' "$changed_files"; then
              echo "documentation-only pull request: running Actions CodeQL only"
              include="$lightweight"
            else
              echo "code-relevant pull request: running the full CodeQL matrix"
            fi
          else
            echo "non-PR event: running the full CodeQL matrix"
          fi
          echo "include=$include" >> "$GITHUB_OUTPUT"

  analyze:
    name: Analyze (${{ matrix.language }})
    needs: select-matrix
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
      packages: read
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.select-matrix.outputs.include) }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        if: matrix.language == 'java-kotlin'
        with:
          distribution: temurin
          java-version: 25
      - uses: gradle/actions/setup-gradle@v6
        if: matrix.language == 'java-kotlin'

      - uses: actions/setup-go@v6
        if: matrix.language == 'go'
        with:
          go-version-file: backends/go/go.mod
          cache-dependency-path: |
            backends/go-echo/go.sum
            backends/go/go.sum
            gateways/go/go.sum

      - uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Build the Kotlin backend
        if: matrix.language == 'java-kotlin'
        working-directory: backends/spring-kotlin
        run: ./gradlew assemble

      - name: Build the Kotlin gateway
        if: matrix.language == 'java-kotlin'
        working-directory: gateways/spring-cloud-gateway
        run: ./gradlew assemble

      - name: Build the Go backend
        if: matrix.language == 'go'
        working-directory: backends/go
        run: go build ./...

      - name: Build the Go Echo backend
        if: matrix.language == 'go'
        working-directory: backends/go-echo
        run: go build ./...

      - name: Build the Go gateway
        if: matrix.language == 'go'
        working-directory: gateways/go
        run: go build ./...

      - uses: github/codeql-action/analyze@v4
        id: analyze
        with:
          category: "/language:${{ matrix.language }}"
          output: sarif-results

      # Honor inline `// codeql[query-id]` suppression comments: dismiss the
      # code-scanning alerts each language's SARIF marks as suppressed. Gated to
      # main so a PR branch's suppression comments can't dismiss alerts before
      # they merge. Keep SARIF filenames explicit because CodeQL writes grouped
      # language IDs under their base language names, such as java.sarif and
      # javascript.sarif. Per-language SARIF paths keep each analysis isolated
      # (the action only reopens its own "Suppressed via SARIF" dismissals).
      - uses: advanced-security/dismiss-alerts@v2
        if: github.ref == 'refs/heads/main'
        with:
          sarif-id: ${{ steps.analyze.outputs.sarif-id }}
          sarif-file: sarif-results/${{ matrix.sarif-language }}.sarif
        env:
          GITHUB_TOKEN: ${{ github.token }}
