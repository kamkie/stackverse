# CodeQL static analysis over every language in the repo. Kotlin still needs a
# real compile (build-mode none analyzes Java but skips Kotlin sources), so the
# java-kotlin matrix leg builds the backend manually; the rest scan buildless.
name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 4 * * 1" # weekly, catches newly published queries

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
      packages: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: csharp
            build-mode: none
          - language: java-kotlin
            build-mode: manual
          - language: javascript-typescript
            build-mode: none
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        if: matrix.language == 'java-kotlin'
        with:
          distribution: temurin
          java-version: 25
      - uses: gradle/actions/setup-gradle@v6
        if: matrix.language == 'java-kotlin'

      - uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Build the Kotlin backend
        if: matrix.language == 'java-kotlin'
        working-directory: backends/spring-kotlin
        run: ./gradlew assemble

      - uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
