# Build and unit tests for one implementation. Each implementation has its own
# build workflow file so parallel variant PRs never edit a shared workflow -
# adding a variant means adding a sibling file, nothing else. The contract
# suites (conformance/e2e) and the ci-ok merge gate live in ci.yml.
name: build-backend-ktor-kotlin

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend-ktor-kotlin:
    name: Backend · Ktor (Kotlin)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backends/ktor-kotlin
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - uses: gradle/actions/setup-gradle@v6
      - name: Build and test
        run: ./gradlew build
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: backends/ktor-kotlin/build/reports/jacoco/test/jacocoTestReport.xml
          flags: backend-ktor-kotlin
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v7
        with:
          report_type: test_results
          directory: backends/ktor-kotlin/build/test-results/test
          flags: backend-ktor-kotlin
          token: ${{ secrets.CODECOV_TOKEN }}
