# Build and unit tests for one implementation. Each implementation has its own
# build workflow file so parallel variant PRs never edit a shared workflow -
# adding a variant means adding a sibling file, nothing else. The contract
# suites (conformance/e2e) and the ci-ok merge gate live in ci.yml.
name: build-backend-ktor-kotlin

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - '.github/workflows/build-backend-ktor-kotlin.yml'
      - 'backends/ktor-kotlin/**'
      - 'spec/openapi.yaml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend-ktor-kotlin:
    name: Backend · Ktor (Kotlin)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backends/ktor-kotlin
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - uses: gradle/actions/setup-gradle@v6
      - name: Build and test
        run: ./gradlew build
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: backends/ktor-kotlin/build/reports/jacoco/test/jacocoTestReport.xml
          flags: backend-ktor-kotlin
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v7
        with:
          report_type: test_results
          files: backends/ktor-kotlin/build/test-results/test/TEST-*.xml
          flags: backend-ktor-kotlin
          token: ${{ secrets.CODECOV_TOKEN }}

  # The dependency submission API requires contents: write. Keep PR builds
  # read-only and submit resolved Gradle snapshots only from trusted main pushes.
  backend-ktor-kotlin-dependency-submission:
    name: Backend · Ktor (Kotlin) dependency submission
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    defaults:
      run:
        working-directory: backends/ktor-kotlin
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - uses: gradle/actions/setup-gradle@v6
        with:
          dependency-graph: generate-and-submit
          dependency-graph-continue-on-failure: false
      - name: Submit Gradle dependency graph
        run: ./gradlew dependencies
