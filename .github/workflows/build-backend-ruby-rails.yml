# Build and unit tests for one implementation. Each implementation has its own
# build workflow file so parallel variant PRs never edit a shared workflow —
# adding a variant means adding a sibling file, nothing else. The contract
# suites (conformance/e2e) and the ci-ok merge gate live in ci.yml.
name: build-backend-ruby-rails

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - '.github/workflows/build-backend-ruby-rails.yml'
      - 'backends/ruby-rails/**'
      - 'spec/openapi.yaml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend-ruby-rails:
    name: Backend · Ruby on Rails API
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DB_HOST: localhost
      DB_PORT: '5432'
      DB_NAME: stackverse_test
      DB_USER: stackverse
      DB_PASSWORD: stackverse
      RAILS_ENV: test
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: stackverse_test
          POSTGRES_USER: stackverse
          POSTGRES_PASSWORD: stackverse
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stackverse -d stackverse_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backends/ruby-rails
    steps:
      - uses: actions/checkout@v7
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0.5"
          bundler-cache: true
          working-directory: backends/ruby-rails
      - name: Lint
        run: bundle exec rubocop
      - name: Zeitwerk check
        run: bundle exec rails zeitwerk:check
      - name: Prepare test database
        run: bundle exec rails db:prepare
      - name: Test
        run: bundle exec rails test
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        continue-on-error: true
        with:
          disable_search: true
          files: backends/ruby-rails/coverage/coverage.xml
          flags: backend-ruby-rails
          token: ${{ secrets.CODECOV_TOKEN }}
