# Build and unit tests for one implementation. Each implementation has its own
# build workflow file so parallel variant PRs never edit a shared workflow.
name: build-backend-micronaut-java

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - '.github/workflows/build-backend-micronaut-java.yml'
      - 'backends/micronaut-java/**'
      - 'spec/openapi.yaml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend-micronaut-java:
    name: Backend · Micronaut (Java)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backends/micronaut-java
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - uses: gradle/actions/setup-gradle@v6
      - name: Build and test
        run: ./gradlew build
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: backends/micronaut-java/build/reports/jacoco/test/jacocoTestReport.xml
          flags: backend-micronaut-java
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v7
        with:
          report_type: test_results
          directory: backends/micronaut-java/build/test-results/test
          flags: backend-micronaut-java
          token: ${{ secrets.CODECOV_TOKEN }}
