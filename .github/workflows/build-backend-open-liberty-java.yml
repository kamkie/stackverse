# Build and unit/integration tests for one implementation. Each implementation
# has its own build workflow file so parallel variant PRs never edit a shared
# workflow — adding a variant means adding a sibling file, nothing else.
# The contract suites (conformance/e2e) and the ci-ok merge gate live in ci.yml.
name: build-backend-open-liberty-java

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - '.github/workflows/build-backend-open-liberty-java.yml'
      - 'backends/open-liberty-java/**'
      - 'spec/openapi.yaml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend-open-liberty-java:
    name: Backend · Open Liberty Java (Maven)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backends/open-liberty-java
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
          cache: maven
      - name: Build and test
        run: ./mvnw -B -ntp test
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: backends/open-liberty-java/target/site/jacoco/jacoco.xml
          flags: backend-open-liberty-java
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v7
        with:
          report_type: test_results
          directory: backends/open-liberty-java/target/surefire-reports
          flags: backend-open-liberty-java
          token: ${{ secrets.CODECOV_TOKEN }}

  # The dependency submission API requires contents: write. Keep PR builds
  # read-only and submit resolved Maven snapshots only from trusted main pushes.
  backend-open-liberty-java-dependency-submission:
    name: Backend · Open Liberty Java dependency submission
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
          cache: maven
      - name: Submit Maven dependency graph
        uses: advanced-security/maven-dependency-submission-action@v5
        with:
          directory: backends/open-liberty-java
          correlator: backend-open-liberty-java
