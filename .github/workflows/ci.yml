# The implementation-agnostic half of CI: the two black-box contract suites —
# conformance directly against every backend, e2e through the full composed
# stack once per frontend — plus the ci-ok merge gate. Implementations are
# discovered from the filesystem, and per-implementation builds live in their
# own build-*.yml workflows, so this file is O(1) in the number of stacks:
# a new variant adds its own directory and build workflow and is picked up
# here with zero edits — that is what keeps parallel variant PRs from
# conflicting in shared files.
#
# All jobs run unconditionally (no path filters): the contract couples
# everything to spec/ and docs/.
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Lists implementations from the filesystem: a directory with a Dockerfile
  # under backends/ or frontends/ is an implementation. Feeds the matrices
  # below, so adding a variant needs no edit here.
  discover:
    name: Discover implementations
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      backends: ${{ steps.list.outputs.backends }}
      frontends: ${{ steps.list.outputs.frontends }}
    steps:
      - uses: actions/checkout@v7
      - id: list
        name: List implementation directories
        run: |
          backends=$(ls -d backends/*/Dockerfile | cut -d/ -f2 | jq -Rnc '[inputs]')
          frontends=$(ls -d frontends/*/Dockerfile | cut -d/ -f2 | jq -Rnc '[inputs]')
          echo "backends=$backends" | tee -a "$GITHUB_OUTPUT"
          echo "frontends=$frontends" | tee -a "$GITHUB_OUTPUT"

  conformance:
    name: Conformance · ${{ matrix.backend }} backend
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: discover
    strategy:
      fail-fast: false
      matrix:
        backend: ${{ fromJSON(needs.discover.outputs.backends) }}
    env:
      BACKEND_IMAGE: stackverse/backend-${{ matrix.backend }}:local
    steps:
      - uses: actions/checkout@v7
      - name: Build backend image
        run: docker build -t "$BACKEND_IMAGE" -f "backends/${{ matrix.backend }}/Dockerfile" .
      # starts postgres + keycloak (waits on their healthchecks), then the backend
      - name: Start infra + backend
        run: docker compose --profile app up -d backend
      - run: corepack enable
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      # Yarn Berry PnP: archives live in the global cache, not node_modules
      - uses: actions/cache@v6
        with:
          path: ~/.yarn/berry/cache
          key: yarn-${{ runner.os }}-conformance-${{ hashFiles('conformance/yarn.lock') }}
          restore-keys: yarn-${{ runner.os }}-conformance-
      - name: Install dependencies
        working-directory: conformance
        run: yarn install --immutable
      - name: Wait for the backend to be ready
        run: |
          for _ in $(seq 1 60); do
            if curl -fsS http://localhost:8080/readyz >/dev/null 2>&1; then exit 0; fi
            sleep 2
          done
          echo "backend never became ready" >&2
          exit 1
      - name: Run conformance suite
        working-directory: conformance
        run: yarn playwright test
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v7
        with:
          report_type: test_results
          files: conformance/test-results/junit.xml
          flags: conformance
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Dump compose logs
        if: failure()
        run: docker compose logs
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: conformance-report-${{ matrix.backend }}
          path: conformance/playwright-report/
          retention-days: 7

  # Frontends are proven by e2e (there is no per-frontend conformance suite),
  # so every frontend implementation gets its own composed run. The backend and
  # gateway legs stay pinned to the reference implementations — the matrix
  # exists to prove each frontend, not every combination.
  e2e:
    name: E2E · spring-kotlin + yarp + ${{ matrix.frontend }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: discover
    strategy:
      fail-fast: false
      matrix:
        frontend: ${{ fromJSON(needs.discover.outputs.frontends) }}
    env:
      BACKEND_IMAGE: stackverse/backend-spring-kotlin:local
      GATEWAY_IMAGE: stackverse/gateway-yarp:local
      FRONTEND_IMAGE: stackverse/frontend-${{ matrix.frontend }}:local
    steps:
      - uses: actions/checkout@v7
      - name: Build images
        run: ./scripts/build-images.sh spring-kotlin yarp "${{ matrix.frontend }}"
      - name: Start the full stack
        run: docker compose --profile app up -d
      - run: corepack enable
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      # Yarn Berry PnP: archives live in the global cache, not node_modules
      - uses: actions/cache@v6
        with:
          path: ~/.yarn/berry/cache
          key: yarn-${{ runner.os }}-e2e-${{ hashFiles('e2e/yarn.lock') }}
          restore-keys: yarn-${{ runner.os }}-e2e-
      - name: Install dependencies
        working-directory: e2e
        run: yarn install --immutable
      - name: Install Playwright browsers
        working-directory: e2e
        run: yarn playwright install --with-deps chromium
      # the gateway serves the SPA only after the frontend one-shot has
      # published it and keycloak/backend are up — poll both layers
      - name: Wait for the stack to be ready
        run: |
          for _ in $(seq 1 90); do
            if curl -fsS http://localhost:8080/readyz >/dev/null 2>&1 \
               && curl -fsS http://localhost:8000/ >/dev/null 2>&1; then exit 0; fi
            sleep 2
          done
          echo "stack never became ready" >&2
          exit 1
      - name: Run e2e suite
        working-directory: e2e
        run: yarn playwright test
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v7
        with:
          report_type: test_results
          files: e2e/test-results/junit.xml
          flags: e2e
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Dump compose logs
        if: failure()
        run: docker compose logs
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-report-${{ matrix.frontend }}
          path: |
            e2e/playwright-report/
            e2e/test-results/
          retention-days: 7

  # The single merge gate: branch protection requires this one check instead of
  # naming every job, so required checks never change when a variant lands.
  # `needs` covers this workflow's jobs; the per-implementation build workflows
  # are separate files (GitHub Actions `needs` cannot cross workflows), so the
  # last step waits for every other GitHub-Actions check on the same commit —
  # which automatically includes any future build-*.yml. Waiting on observed
  # checks alone would pass silently when a build workflow is missing or never
  # ran (broken YAML produces no check runs at all), so the gate also asserts
  # that every implementation directory has its build workflow and that every
  # build-*.yml produced a successful workflow run for this commit.
  ci-ok:
    name: ci-ok
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [discover, conformance, e2e]
    if: always()
    permissions:
      actions: read
      checks: read
      contents: read
    steps:
      - name: Fail if a contract-suite job failed
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped') }}
        run: |
          echo "a needed job did not succeed: discover=${{ needs.discover.result }} conformance=${{ needs.conformance.result }} e2e=${{ needs.e2e.result }}" >&2
          exit 1
      - uses: actions/checkout@v7
      - name: Every implementation must have a build workflow
        run: |
          set -eu
          missing=0
          for dir in backends gateways frontends; do
            layer="${dir%s}"
            for dockerfile in "$dir"/*/Dockerfile; do
              [ -e "$dockerfile" ] || continue
              name=$(basename "$(dirname "$dockerfile")")
              wf=".github/workflows/build-${layer}-${name}.yml"
              if [ ! -f "$wf" ]; then
                echo "::error::$dir/$name has no $wf — every implementation ships its own build workflow"
                missing=1
              fi
            done
          done
          exit "$missing"
      - name: Wait for every other check on this commit
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -eu
          expected=$(ls .github/workflows/build-*.yml)
          echo "gating on all github-actions check runs for $SHA and on runs of:"
          echo "$expected"
          for attempt in $(seq 1 90); do
            waiting=""

            # 1) every build-*.yml must have a successful workflow run for this
            #    commit — a workflow that never ran creates no check runs and
            #    would be invisible to the check-run scan below. Only the latest
            #    run per workflow counts: a closed/reopened PR keeps its head
            #    SHA, so a concurrency-cancelled older run must not veto the
            #    successful current one.
            runs=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs?head_sha=${SHA}&per_page=100" \
              --paginate --slurp \
              | jq '[.[].workflow_runs[] | {path, status, conclusion, run_number}]')
            for wf in $expected; do
              state=$(echo "$runs" | jq -r --arg p "$wf" '[.[] | select(.path == $p)]
                      | sort_by(.run_number) | last
                      | if . == null then "missing"
                        elif .status != "completed" then "running"
                        elif .conclusion == "success" then "success"
                        else "failed:" + .conclusion end')
              case "$state" in
                success) ;;
                failed:*)
                  echo "latest run of $wf concluded ${state#failed:} for $SHA" >&2
                  exit 1
                  ;;
                *) waiting="$waiting $wf" ;;
              esac
            done

            # 2) every other github-actions check run must complete successfully
            #    (gh cannot combine --slurp with --jq, so filter with external jq)
            checks=$(gh api "repos/${GITHUB_REPOSITORY}/commits/${SHA}/check-runs?per_page=100" \
              --paginate --slurp \
              | jq '[.[].check_runs[]
                     | select(.app.slug == "github-actions" and .name != "ci-ok")
                     | {name, status, conclusion}]')
            failed=$(echo "$checks" | jq '[.[] | select(.status == "completed"
                     and .conclusion != "success" and .conclusion != "neutral"
                     and .conclusion != "skipped")]')
            if [ "$(echo "$failed" | jq length)" -gt 0 ]; then
              echo "failed checks:" >&2
              echo "$failed" | jq -r '.[] | "  \(.name): \(.conclusion)"' >&2
              exit 1
            fi
            pending=$(echo "$checks" | jq '[.[] | select(.status != "completed")]')
            if [ -z "$waiting" ] && [ "$(echo "$pending" | jq length)" -eq 0 ]; then
              echo "all $(echo "$checks" | jq length) other checks green; every build workflow ran"
              exit 0
            fi
            echo "attempt $attempt: still waiting"
            [ -n "$waiting" ] && echo "  no successful run yet for:$waiting"
            echo "$pending" | jq -r '.[] | "  \(.name): \(.status)"'
            sleep 20
          done
          echo "timed out waiting for other checks" >&2
          exit 1
