# Build and unit tests for one implementation. Each implementation has its own
# build workflow file so parallel variant PRs never edit a shared workflow.
name: build-backend-spring-java

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - '.github/workflows/build-backend-spring-java.yml'
      - 'backends/spring-java/**'
      - 'spec/openapi.yaml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend-spring-java:
    name: Backend · Spring Boot (Java)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backends/spring-java
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - uses: gradle/actions/setup-gradle@v6
      - name: Build and test
        run: ./gradlew build
      - name: Merge JUnit test results
        run: |
          python - <<'PY'
          import glob
          import pathlib
          import xml.etree.ElementTree as ET

          files = sorted(glob.glob("build/test-results/test/TEST-*.xml"))
          if not files:
              raise SystemExit("No Gradle JUnit XML files found in build/test-results/test")

          root = ET.Element("testsuites")
          totals = {"tests": 0, "failures": 0, "errors": 0, "skipped": 0}
          total_time = 0.0

          for file_name in files:
              suite = ET.parse(file_name).getroot()
              root.append(suite)
              for key in totals:
                  totals[key] += int(suite.attrib.get(key, "0"))
              total_time += float(suite.attrib.get("time", "0"))

          for key, value in totals.items():
              root.set(key, str(value))
          root.set("time", f"{total_time:.3f}")

          out = pathlib.Path("TestResults/junit.xml")
          out.parent.mkdir(exist_ok=True)
          ET.ElementTree(root).write(out, encoding="utf-8", xml_declaration=True)
          print(f"Merged {len(files)} Gradle JUnit XML files into {out}")
          PY
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: backends/spring-java/build/reports/jacoco/test/jacocoTestReport.xml
          flags: backend-spring-java
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v7
        with:
          report_type: test_results
          files: backends/spring-java/TestResults/junit.xml
          flags: backend-spring-java
          token: ${{ secrets.CODECOV_TOKEN }}

  # The dependency submission API requires contents: write. Keep PR builds
  # read-only and submit resolved Gradle snapshots only from trusted main pushes.
  backend-spring-java-dependency-submission:
    name: Backend · Spring Boot (Java) dependency submission
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    defaults:
      run:
        working-directory: backends/spring-java
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - uses: gradle/actions/setup-gradle@v6
        with:
          dependency-graph: generate-and-submit
          dependency-graph-continue-on-failure: false
      - name: Submit Gradle dependency graph
        run: ./gradlew dependencies
