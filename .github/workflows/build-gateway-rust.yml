# Build and unit/integration tests for one implementation. Each implementation
# has its own build workflow file so parallel variant PRs never edit a shared
# workflow — adding a variant means adding a sibling file, nothing else.
name: build-gateway-rust

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - '.github/workflows/build-gateway-rust.yml'
      - 'gateways/rust/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gateway-rust:
    name: Gateway · Rust Axum
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: gateways/rust
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            gateways/rust/target
          key: cargo-${{ runner.os }}-gateway-rust-${{ hashFiles('gateways/rust/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-gateway-rust-
      - name: Format
        run: cargo fmt --check
      - name: Check
        run: cargo check --locked
      - name: Test with coverage
        run: |
          mkdir -p coverage
          cargo llvm-cov --locked --lcov --output-path coverage/lcov.info
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        continue-on-error: true
        with:
          files: gateways/rust/coverage/lcov.info
          flags: gateway-rust
          token: ${{ secrets.CODECOV_TOKEN }}

  # The dependency submission API requires contents: write. Keep PR builds
  # read-only and submit resolved Cargo snapshots only from trusted main pushes.
  gateway-rust-dependency-submission:
    name: Gateway · Rust dependency submission
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - name: Submit Cargo dependency graph
        uses: advanced-security/component-detection-dependency-submission-action@v0.1.4
        with:
          filePath: gateways/rust
          detectorsCategories: Cargo
          correlator: gateway-rust
