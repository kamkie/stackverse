# Build and unit tests for one implementation. Each implementation has its own
# build workflow file so parallel variant PRs never edit a shared workflow —
# adding a variant means adding a sibling file, nothing else. The contract
# suites (conformance/e2e) and the ci-ok merge gate live in ci.yml.
name: build-backend-quarkus-java

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - '.github/workflows/build-backend-quarkus-java.yml'
      - 'backends/quarkus-java/**'
      - 'spec/openapi.yaml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend-quarkus-java:
    name: Backend · Quarkus Java (Maven)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backends/quarkus-java
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - name: Build and test
        run: mvn -B verify
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: backends/quarkus-java/target/site/jacoco/jacoco.xml
          flags: backend-quarkus-java
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v7
        with:
          report_type: test_results
          directory: backends/quarkus-java/target/surefire-reports
          flags: backend-quarkus-java
          token: ${{ secrets.CODECOV_TOKEN }}
