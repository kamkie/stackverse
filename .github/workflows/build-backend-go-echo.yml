# Build and unit/integration tests for one implementation. Each implementation
# has its own build workflow file so parallel variant PRs never edit a shared
# workflow — adding a variant means adding a sibling file, nothing else.
# The contract suites (conformance/e2e) and the ci-ok merge gate live in ci.yml.
name: build-backend-go-echo

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - '.github/workflows/build-backend-go-echo.yml'
      - 'backends/go-echo/**'
      - 'spec/openapi.yaml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend-go-echo:
    name: Backend · Go (Echo)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: stackverse_go_echo_test
          POSTGRES_USER: stackverse
          POSTGRES_PASSWORD: stackverse
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stackverse -d stackverse_go_echo_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backends/go-echo
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: backends/go-echo/go.mod
          cache-dependency-path: backends/go-echo/go.sum
      - name: Verify modules
        run: go mod verify
      - name: Format
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "$unformatted"
            exit 1
          fi
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Test
        run: |
          mkdir -p TestResults
          go run gotest.tools/gotestsum@v1.13.0 --junitfile TestResults/junit.xml \
            -- -count=1 -coverprofile TestResults/coverage-unit.out -covermode=atomic ./...
      - name: Integration coverage
        env:
          STACKVERSE_TEST_DATABASE_URL: postgres://stackverse:stackverse@localhost:5432/stackverse_go_echo_test?sslmode=disable
        run: >-
          go test -count=1 -run '^TestPostgresBackedContractBoundaries$'
          -coverprofile TestResults/coverage-integration.out
          -covermode=atomic
          -coverpkg=github.com/kamkie/stackverse/backends/go-echo/...
          ./internal/app
      - name: Merge coverage profiles
        run: |
          awk '
            /^mode:/ { next }
            {
              key = $1 " " $2
              if (!(key in seen)) {
                seen[key] = 1
                order[++count] = key
              }
              if (!(key in hits) || $3 > hits[key]) hits[key] = $3
            }
            END {
              print "mode: atomic"
              for (i = 1; i <= count; i++) print order[i], hits[order[i]]
            }
          ' TestResults/coverage-unit.out TestResults/coverage-integration.out > coverage.out
      - name: Normalize coverage paths
        run: node ../../tools/normalize-coverage-paths.mjs coverage.out backends/go-echo/
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        continue-on-error: true
        with:
          disable_search: true
          files: backends/go-echo/coverage.out
          flags: backend-go-echo
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v7
        continue-on-error: true
        with:
          disable_search: true
          report_type: test_results
          files: backends/go-echo/TestResults/junit.xml
          flags: backend-go-echo
          token: ${{ secrets.CODECOV_TOKEN }}

  # The dependency submission API requires contents: write. Keep PR builds
  # read-only and submit resolved Go module snapshots only from trusted main pushes.
  backend-go-echo-dependency-submission:
    name: Backend · Go Echo dependency submission
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: backends/go-echo/go.mod
          cache-dependency-path: backends/go-echo/go.sum
      - name: Submit Go dependency graph
        uses: actions/go-dependency-submission@v2
        with:
          go-mod-path: backends/go-echo/go.mod
