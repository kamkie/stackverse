# Build and unit tests for one implementation. Each implementation has its own
# build workflow so adding a variant does not edit a shared build matrix.
name: build-backend-grails

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - '.github/workflows/build-backend-grails.yml'
      - 'backends/grails/**'
      - 'spec/openapi.yaml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend-grails:
    name: Backend · Grails (Groovy)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: stackverse
          POSTGRES_USER: stackverse
          POSTGRES_PASSWORD: stackverse
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stackverse -d stackverse"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      STACKVERSE_DB_TESTS: 'true'
    defaults:
      run:
        working-directory: backends/grails
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - uses: gradle/actions/setup-gradle@v6
      - name: Build and test
        run: ./gradlew build
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        continue-on-error: true
        with:
          files: backends/grails/build/reports/jacoco/test/jacocoTestReport.xml
          flags: backend-grails
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v7
        continue-on-error: true
        with:
          report_type: test_results
          directory: backends/grails/build/test-results/test
          flags: backend-grails
          token: ${{ secrets.CODECOV_TOKEN }}

  # The dependency submission API requires contents: write. Keep PR builds
  # read-only and submit resolved Gradle snapshots only from trusted main pushes.
  backend-grails-dependency-submission:
    name: Backend · Grails (Groovy) dependency submission
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    defaults:
      run:
        working-directory: backends/grails
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - uses: gradle/actions/setup-gradle@v6
        with:
          dependency-graph: generate-and-submit
          dependency-graph-continue-on-failure: false
      - name: Submit Gradle dependency graph
        run: ./gradlew dependencies
