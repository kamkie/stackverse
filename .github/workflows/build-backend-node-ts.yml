# Build and unit tests for one implementation. Each implementation has its own
# build workflow file so parallel variant PRs never edit a shared workflow —
# adding a variant means adding a sibling file, nothing else. The contract
# suites (conformance/e2e) and the ci-ok merge gate live in ci.yml.
name: build-backend-node-ts

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - '.github/workflows/build-backend-node-ts.yml'
      - 'backends/node-ts/**'
      - 'spec/openapi.yaml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend-node-ts:
    name: Backend · Node.js (TypeScript)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backends/node-ts
    steps:
      - uses: actions/checkout@v7
      - run: corepack enable
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      # Yarn Berry PnP with a per-project cache (enableGlobalCache: false)
      - uses: actions/cache@v6
        with:
          path: backends/node-ts/.yarn/cache
          key: yarn-${{ runner.os }}-backend-node-ts-${{ hashFiles('backends/node-ts/yarn.lock') }}
          restore-keys: yarn-${{ runner.os }}-backend-node-ts-
      - name: Install dependencies
        run: yarn install --immutable
      - name: Typecheck and build
        run: yarn build
      - name: Test with coverage
        run: yarn test --coverage
      - name: Normalize coverage paths
        run: node ../../tools/normalize-coverage-paths.mjs coverage/lcov.info backends/node-ts/
      # Dependabot PRs do not receive the repository Codecov token unless it is
      # also configured as a Dependabot secret; keep app verification authoritative.
      - name: Upload coverage to Codecov
        if: ${{ github.actor != 'dependabot[bot]' }}
        uses: codecov/codecov-action@v7
        with:
          files: backends/node-ts/coverage/lcov.info
          flags: backend-node-ts
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload test results to Codecov
        if: ${{ !cancelled() && github.actor != 'dependabot[bot]' }}
        uses: codecov/codecov-action@v7
        with:
          report_type: test_results
          files: backends/node-ts/test-results/junit.xml
          flags: backend-node-ts
          token: ${{ secrets.CODECOV_TOKEN }}
