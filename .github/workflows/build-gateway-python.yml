# Build and unit tests for one implementation. Each implementation has its own
# build workflow file so parallel variant PRs never edit a shared workflow —
# adding a variant means adding a sibling file, nothing else. The contract
# suites (conformance/e2e) and the ci-ok merge gate live in ci.yml.
name: build-gateway-python

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - '.github/workflows/build-gateway-python.yml'
      - 'gateways/python/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gateway-python:
    name: Gateway · Python Starlette
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: gateways/python
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: gateways/python/pyproject.toml
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"
      - name: Compile
        run: python -m compileall stackverse_gateway tests
      - name: Lint
        run: python -m ruff check .
      - name: Format check
        run: python -m ruff format --check .
      - name: Test with coverage
        run: |
          mkdir -p TestResults
          python -m pytest --cov=stackverse_gateway --cov-report=xml --junitxml=TestResults/junit.xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        continue-on-error: true
        with:
          files: gateways/python/coverage.xml
          flags: gateway-python
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v7
        continue-on-error: true
        with:
          report_type: test_results
          files: gateways/python/TestResults/junit.xml
          flags: gateway-python
          token: ${{ secrets.CODECOV_TOKEN }}
