# Coverage is informational: this repo's acceptance gate is the conformance and
# e2e suites, not a coverage number — Codecov reports must never fail CI.
coverage:
  status:
    project:
      default:
        informational: true
    patch:
      default:
        informational: true

# One flag per implementation, matching the CI job that uploads it. carryforward
# keeps a flag's last value when a commit doesn't re-run that implementation.
flags:
  backend-spring-kotlin:
    paths:
      - backends/spring-kotlin/
    carryforward: true
  gateway-yarp:
    paths:
      - gateways/yarp/
    carryforward: true
  frontend-react:
    paths:
      - frontends/react/
    carryforward: true

comment:
  layout: "condensed_header, diff, flags"
