# Coverage is informational: this repo's acceptance gate is the conformance and
# e2e suites, not a coverage number — Codecov reports must never fail CI.
coverage:
  status:
    project:
      default:
        informational: true
    patch:
      default:
        informational: true

# One flag per implementation, matching the CI job that uploads it. carryforward
# keeps a flag's last value when a commit doesn't re-run that implementation.
# Planned variants are pre-seeded (alphabetized) so a variant PR never edits
# this shared file — a flag with no uploads is inert.
flags:
  backend-dotnet:
    paths:
      - backends/dotnet/
    carryforward: true
  backend-go:
    paths:
      - backends/go/
    carryforward: true
  backend-grails:
    paths:
      - backends/grails/
    carryforward: true
  backend-ktor-kotlin:
    paths:
      - backends/ktor-kotlin/
    carryforward: true
  backend-micronaut-java:
    paths:
      - backends/micronaut-java/
    carryforward: true
  backend-node-nestjs:
    paths:
      - backends/node-nestjs/
    carryforward: true
  backend-node-ts:
    paths:
      - backends/node-ts/
    carryforward: true
  backend-spring-kotlin:
    paths:
      - backends/spring-kotlin/
    carryforward: true
  frontend-angular:
    paths:
      - frontends/angular/
    carryforward: true
  frontend-react:
    paths:
      - frontends/react/
    carryforward: true
  frontend-svelte:
    paths:
      - frontends/svelte/
    carryforward: true
  frontend-vue:
    paths:
      - frontends/vue/
    carryforward: true
  gateway-go:
    paths:
      - gateways/go/
    carryforward: true
  gateway-node-fastify:
    paths:
      - gateways/node-fastify/
    carryforward: true
  gateway-openresty:
    paths:
      - gateways/openresty/
    carryforward: true
  gateway-spring-cloud-gateway:
    paths:
      - gateways/spring-cloud-gateway/
    carryforward: true
  gateway-yarp:
    paths:
      - gateways/yarp/
    carryforward: true

# Components are yml-defined virtual filters over the same uploads — one per
# implementation, mirroring the flags. They add per-component numbers to the
# PR comment and a Components view in the dashboard; when sibling variants
# land (more backends/gateways/frontends), category roll-up components can
# aggregate across them, which flags can't. No statuses on purpose: coverage
# stays informational (see above).
component_management:
  individual_components:
    - component_id: backend-dotnet
      name: "backend · dotnet"
      paths:
        - backends/dotnet/**
    - component_id: backend-go
      name: "backend · go"
      paths:
        - backends/go/**
    - component_id: backend-grails
      name: "backend · grails"
      paths:
        - backends/grails/**
    - component_id: backend-ktor-kotlin
      name: "backend · ktor-kotlin"
      paths:
        - backends/ktor-kotlin/**
    - component_id: backend-micronaut-java
      name: "backend · micronaut-java"
      paths:
        - backends/micronaut-java/**
    - component_id: backend-node-nestjs
      name: "backend · node-nestjs"
      paths:
        - backends/node-nestjs/**
    - component_id: backend-node-ts
      name: "backend · node-ts"
      paths:
        - backends/node-ts/**
    - component_id: backend-spring-kotlin
      name: "backend · spring-kotlin"
      paths:
        - backends/spring-kotlin/**
    - component_id: frontend-angular
      name: "frontend · angular"
      paths:
        - frontends/angular/**
    - component_id: frontend-react
      name: "frontend · react"
      paths:
        - frontends/react/**
    - component_id: frontend-svelte
      name: "frontend · svelte"
      paths:
        - frontends/svelte/**
    - component_id: frontend-vue
      name: "frontend · vue"
      paths:
        - frontends/vue/**
    - component_id: gateway-go
      name: "gateway · go"
      paths:
        - gateways/go/**
    - component_id: gateway-node-fastify
      name: "gateway · node-fastify"
      paths:
        - gateways/node-fastify/**
    - component_id: gateway-openresty
      name: "gateway · openresty"
      paths:
        - gateways/openresty/**
    - component_id: gateway-spring-cloud-gateway
      name: "gateway · spring-cloud-gateway"
      paths:
        - gateways/spring-cloud-gateway/**
    - component_id: gateway-yarp
      name: "gateway · yarp"
      paths:
        - gateways/yarp/**

comment:
  layout: "condensed_header, diff, flags, components"
