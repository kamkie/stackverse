# Coverage is informational: this repo's acceptance gate is the conformance and
# e2e suites, not a coverage number — Codecov reports must never fail CI.
coverage:
  status:
    project:
      default:
        informational: true
    patch:
      default:
        informational: true

# One flag per implementation, matching the CI job that uploads it. carryforward
# keeps a flag's last value when a commit doesn't re-run that implementation.
flags:
  backend-spring-kotlin:
    paths:
      - backends/spring-kotlin/
    carryforward: true
  gateway-yarp:
    paths:
      - gateways/yarp/
    carryforward: true
  frontend-react:
    paths:
      - frontends/react/
    carryforward: true

# Components are yml-defined virtual filters over the same uploads — one per
# implementation, mirroring the flags. They add per-component numbers to the
# PR comment and a Components view in the dashboard; when sibling variants
# land (more backends/gateways/frontends), category roll-up components can
# aggregate across them, which flags can't. No statuses on purpose: coverage
# stays informational (see above).
component_management:
  individual_components:
    - component_id: backend-spring-kotlin
      name: "backend · spring-kotlin"
      paths:
        - backends/spring-kotlin/**
    - component_id: gateway-yarp
      name: "gateway · yarp"
      paths:
        - gateways/yarp/**
    - component_id: frontend-react
      name: "frontend · react"
      paths:
        - frontends/react/**

comment:
  layout: "condensed_header, diff, flags, components"
